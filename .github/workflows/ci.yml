name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: typecheck · build · test · lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version is read from "packageManager" in package.json so CI stays
        # aligned with the lockfile. Declaring `version:` here as well causes
        # pnpm/action-setup to error out (ERR_PNPM_BAD_PM_VERSION).

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Use the root scripts, which route through Turborepo. Turbo honours
      # `dependsOn: ["^build"]` in turbo.json — i.e., upstream packages are
      # built before downstream typecheck/test. `pnpm -r <task>` skips that
      # coordination and runs in parallel, causing TS2307 "cannot find module
      # @kybernesis/arp-spec" when a downstream package typechecks before the
      # upstream package has emitted its dist/*.d.ts.
      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Lint
        run: pnpm run lint
