name: Publish sidecar image

# Dormant until Phase 9. Firing only on pushed tags of the shape `sidecar-v*`
# means normal branch activity never touches GHCR. Keep the workflow dry until
# the first real release tag.
on:
  push:
    tags:
      - 'sidecar-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + push ghcr.io/kybernesisai/sidecar
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            REF="${GITHUB_REF#refs/tags/sidecar-v}"
            echo "version=$REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/sidecar/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/kybernesisai/sidecar:${{ steps.tag.outputs.version }}
            ghcr.io/kybernesisai/sidecar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image-size guard
        run: |
          docker pull ghcr.io/kybernesisai/sidecar:${{ steps.tag.outputs.version }}
          docker tag ghcr.io/kybernesisai/sidecar:${{ steps.tag.outputs.version }} arp-sidecar:local
          bash scripts/validate-image-size.sh
